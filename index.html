<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>TraceFeeder</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TraceFeeder">
    <meta name="apple-mobile-web-app-orientation" content="portrait">
    <meta name="theme-color" content="#005eb8" />

    <link rel="manifest" href="manifest.webmanifest" crossorigin="anonymous" />
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- External stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-shell">
        <header class="nhs-header">
            <div>
                <div class="nhs-header-title">TraceFeeder</div>
                <div class="nhs-header-sub">Demo scanner · Not for clinical use</div>
            </div>
        </header>

        <main class="content">
            <section class="card">
                <div class="card-title">Scan mode</div>
                <div>Select what you’re scanning.</div>
                <div class="btn-row">
                    <button id="btnWristband">Scan wristband</button>
                    <button id="btnFeed" class="secondary">Scan feed</button>
                </div>
            </section>

            <section class="card" id="cameraCard" style="display:none;">
                <div class="card-title" id="cameraTitle">Camera</div>

                <div id="video-container">
                    <div class="scan-frame">
                        <div class="corner tl"></div>
                        <div class="corner tr"></div>
                        <div class="corner bl"></div>
                        <div class="corner br"></div>
                        <div class="scan-bar"></div>
                    </div>

                    <div id="flash-overlay"></div>
                </div>

                <div class="status" id="status">Starting camera…</div>
                <div class="btn-row">
                    <button id="btnStop" class="secondary">Stop camera</button>
                </div>
            </section>

            <section class="card" id="resultCard" style="display:none;">
                <div class="card-title">Last scan</div>
                <div class="result-row"><span class="label">Scan type:</span> <span id="scanType"></span></div>
                <div class="result-row"><span class="label">Patient:</span> <span id="patient"></span></div>
                <div class="result-row"><span class="label">Mother:</span> <span id="mother"></span></div>
                <div class="result-row"><span class="label">Feed:</span> <span id="feed"></span></div>
                <div class="result-row" style="margin-top:6px;"><span class="label">Raw:</span> <span id="raw"></span></div>
            </section>
        </main>

        <footer class="footer">
            TraceFeeder demo · Camera data sent to local backend only
        </footer>
    </div>

    <!-- QR library -->
    <script src="html5-qrcode.min.js"></script>

    <!-- App logic -->
    <script src="app.js"></script>
</body>
</html>
